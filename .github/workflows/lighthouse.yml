name: Lighthouse Audit

on:
#   push:
#     branches: [main]　から、手動実行を有効にする設定へ変更
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse (All HTML files)
        run: |
          lhci autorun \
            --collect.staticDistDir=./HTML_INDIVIDUAL_EXERCISE \
            --upload.target=temporary-public-storage
# レポートの結果は、Google の一時的なサーバーにアップロードされる。
# URLを知っている人は誰でも閲覧可能になる。（保存期間は数日間）