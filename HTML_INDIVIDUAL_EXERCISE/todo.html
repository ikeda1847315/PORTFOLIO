<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="To-do list application demonstrating JavaScript task management features.">
    <title>ToDo</title>
    <link rel="stylesheet" href="css/todo.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
</head>

<body>
    <header>
        <a href="index.html" class="text-logo">🔙 TOP</a>
    </header>

    <a href="#" class="back-to-top">👆</a>
    <!-- href="#"は、ページ先頭を指す -->

    <div class="container">
        <div class="top-bar">
            <h1>ToDo</h1>
            <button id="themeToggle" aria-label="ダークモード切替"> ダーク🌙</button>
        </div>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="タスクを入力">
            <button id="addTask">＋ 追加</button>
        </div>
        <p id="errorMsg">タスクを入力してください</p>

        <div class="controls">

            <!-- 1行目：残り〇件と表示切替をまとめる -->
            <div class="controls-top">
                <p id="taskCount">残り <span id="taskCountNum">0</span> 件</p>
                <div class="filter-group">
                    <label for="filter">表示切替</label>
                    <select id="filter">
                        <option value="all">すべて</option>
                        <option value="active" selected>未完了</option>
                        <option value="completed">完了</option>
                    </select>
                </div>
            </div>

            <!-- 2行目：チェックボックス -->
            <div class="delete-confirm-toggle">
                <label for="skipConfirm">
                    <input type="checkbox" id="skipConfirm">
                    削除時に確認しない
                </label>
            </div>

        </div>

        <ul id="taskList"></ul>

        <div id="deleteModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-icon">🗑️</div>
                    <p class="modal-title">タスクを削除しますか？</p>
                </div>
                <div id="modalMessage" class="modal-message"></div>
                <div class="modal-buttons">
                    <button id="modalCancel">キャンセル</button>
                    <button id="modalConfirm" class="delete-btn">削除する</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/todo.js"></script>
</body>

</html>
