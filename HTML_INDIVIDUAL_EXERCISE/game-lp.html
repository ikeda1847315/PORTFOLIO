<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carve Out</title>
    <link rel="stylesheet" href="../css/game-lp.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☄️</text></svg>">
</head>

<body>

    <header>
        <a href="index.html" class="logo">TOP</a>

        <nav>
            <a href="#about">About</a>
            <a href="#features">Features</a>
            <a href="#download">Download</a>
        </nav>
    </header>

    <section class="hero">
        <div class="overlay"></div>

        <div class="hero-content">
            <p class="sub-title">NEXT GENERATION RPG</p>
            <h1>Carve Out</h1>
            <p class="description">崩壊した未来都市を舞台に、運命を切り拓く</p>

            <div class="hero-buttons">
                <a href="#download" class="primary-btn">Play Now</a>
                <a href="#about" class="secondary-btn">Explore</a>
            </div>
        </div>
    </section>

    <section id="about" class="about-hero">
        <div class="about-overlay"></div>

        <div class="about-content">
            <h2>ABOUT</h2>
            <p>
                記憶を失った男は、巨大企業が支配する都市にいた。<br>
                失われた記憶と、真実を求め、駆ける。
            </p>
        </div>
    </section>

    <section id="features" class="cards-overlap">
        <div class="image-card">
            <img src="images/world.png" alt="">
            <div class="card-overlay">
                <h3>Open World</h3>
                <p>自由探索できる近未来都市</p>
            </div>
        </div>

        <div class="image-card">
            <img src="images/battle.png" alt="">
            <div class="card-overlay">
                <h3>Battle System</h3>
                <p>高速アクション戦闘</p>
            </div>
        </div>

        <div class="image-card">
            <img src="images/story.png" alt="">
            <div class="card-overlay">
                <h3>Story</h3>
                <p>分岐するマルチエンディング</p>
            </div>
        </div>
    </section>

    <section id="download" class="section download">
        <h2>JOIN THE FUTURE</h2>
        <a href="#" class="primary-btn">PARTICIPATE</a>
    </section>

    <script src="../js/game-lp.js"></script>
</body>

</html>
