<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Game landing page project featuring responsive design and interactive UI.">
    <title>Carve Out</title>
    <link rel="stylesheet" href="css/game-lp.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☄️</text></svg>">
</head>

<body>

    <header>
        <a href="index.html" class="logo" aria-label="トップページへ戻る">🔙</a>

        <nav id="nav-menu" aria-label="メインナビゲーション">
            <a href="#top">Top</a>
            <a href="#about">About</a>
            <a href="#features">Features</a>
            <a href="#download">Download</a>
        </nav>

        <button class="hamburger" id="hamburger" aria-label="メニューを開く" aria-expanded="false" aria-controls="nav-menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </header>

    <section id="top" class="hero" aria-label="トップ">
        <img src="images/hero.webp" alt="hero" class="hero-bg" fetchpriority="high" decoding="async">
        <!-- 画像処理において、fetchpriority="high" でネットワーク通信を優先、decoding="async"で、別スレッドでデコードし、メインスレッドをブロックしない挙動にする事で、LCP（最大コンテンツ描画）に有利 -->
        <!-- fetchpriorityは、画像の優先読み込み -->
        <div class="overlay"></div>

        <div class="hero-content">
            <p class="sub-title">NEXT GENERATION RPG</p>
            <h1>Carve Out</h1>
            <p class="description">崩壊した未来都市を舞台に、運命を切り拓く</p>
            <div class="hero-buttons">
                <a href="#download" class="primary-btn">Play Now</a>
                <a href="#about" class="primary-btn">Explore</a>
            </div>
        </div>
    </section>

    <section id="about" class="about-hero" aria-label="ゲーム概要">
        <div class="about-overlay"></div>

        <div class="about-content">
            <h2>ABOUT</h2>
            <p>
                記憶を失った男は、巨大企業が支配する都市にいた。<br>
                失われた記憶と、真実を求め、駆ける。
            </p>
        </div>
    </section>

    <section id="features" class="cards-overlap" aria-label="特徴">
        <div class="image-card">
            <img src="images/world.webp" alt="Open World">
            <div class="card-overlay">
                <h3>Open World</h3>
                <p>自由探索できる近未来都市</p>
            </div>
        </div>

        <div class="image-card">
            <img src="images/battle.webp" alt="Battle System">
            <div class="card-overlay">
                <h3>Battle System</h3>
                <p>高速アクション戦闘</p>
            </div>
        </div>

        <div class="image-card">
            <img src="images/story.webp" alt="Story">
            <div class="card-overlay">
                <h3>Story</h3>
                <p>分岐するマルチエンディング</p>
            </div>
        </div>
    </section>

    <section id="download" class="section download" aria-label="ダウンロード">
        <h2>JOIN THE FUTURE</h2>
        <a href="#" class="primary-btn">PARTICIPATE</a>
    </section>

    <footer>
        &copy; 2026 All Rights Reserved.
    </footer>

    <script src="js/game-lp.js"></script>
</body>

</html>
